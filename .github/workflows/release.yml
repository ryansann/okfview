name: Release (macOS)

# Tag a release to build and attach a macOS .dmg + .zip to that tag's GitHub Release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch: # manual build from the Actions tab (no release upload unless run on a tag)

permissions:
  contents: write # needed to create the Release & upload assets

jobs:
  release:
    runs-on: macos-14 # Apple silicon runner; builds arm64 + x64
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Typecheck & test
        timeout-minutes: 10
        run: |
          npm run typecheck
          npm test

      - name: Build & package (signed/notarized app, dmg + zip, arm64 + x64)
        timeout-minutes: 75
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          DEBUG: electron-notarize*
        run: |
          set -euo pipefail
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          export APPLE_API_KEY="$APPLE_API_KEY_PATH"

          npx electron-vite build
          # On a tag, drive the artifact version from the tag (v0.1.1 -> 0.1.1) so the
          # filenames match the release. extraMetadata overrides package.json at build
          # time without committing a version bump. Off a tag, use package.json as-is.
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Building version $VERSION from tag $GITHUB_REF_NAME"
            npx electron-builder --mac --publish never -c.extraMetadata.version="$VERSION"
          else
            npx electron-builder --mac --publish never
          fi

      - name: Notarize and staple DMGs
        timeout-minutes: 60
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

          for dmg in release/*.dmg; do
            echo "Submitting $dmg for notarization"
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --timeout 45m
            xcrun stapler staple "$dmg"
          done

      - name: Verify macOS signing and notarization
        timeout-minutes: 10
        run: |
          set -euo pipefail
          for app in release/mac*/okfview.app; do
            codesign --verify --deep --strict --verbose=2 "$app"
            spctl --assess --type execute --verbose=4 "$app"
            xcrun stapler validate "$app"
          done

          for dmg in release/*.dmg; do
            hdiutil verify "$dmg"
            spctl --assess --type install --verbose=4 "$dmg"
            xcrun stapler validate "$dmg"
          done

      # Use the pre-installed gh CLI (a native binary — no Node action runtime, so no
      # Node-20 deprecation) to create the Release for the pushed tag and upload the
      # artifacts to it. Idempotent: if the release already exists (re-run), it just
      # (re)uploads the assets.
      - name: Publish artifacts to the tagged GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -la release
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            release/*.dmg release/*.zip \
          || gh release upload "$GITHUB_REF_NAME" --clobber release/*.dmg release/*.zip
