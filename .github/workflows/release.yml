name: Release (macOS)

# Tag a release to build and attach a macOS .dmg + .zip to that tag's GitHub Release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch: # manual build from the Actions tab (no release upload unless run on a tag)

permissions:
  contents: write # needed to create the Release & upload assets

jobs:
  release:
    runs-on: macos-14 # Apple silicon runner; builds arm64 + x64
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Typecheck & test
        timeout-minutes: 10
        run: |
          npm run typecheck
          npm test

      - name: Verify Developer ID signing certificate
        timeout-minutes: 5
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/okfview-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$CSC_LINK" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          echo "Available signing identities in CSC_LINK:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          DEVELOPER_ID_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application: .*\)"/\1/p' | head -n 1)"
          if [[ -z "$DEVELOPER_ID_IDENTITY" ]]; then
            echo "::error::CSC_LINK does not contain a valid Developer ID Application signing identity. Export the Developer ID Application certificate and private key as a .p12 from Keychain Access > My Certificates, base64 that .p12, and update the CSC_LINK secret."
            exit 1
          fi

          echo "Using signing identity: $DEVELOPER_ID_IDENTITY"
          echo "CSC_NAME=${DEVELOPER_ID_IDENTITY#Developer ID Application: }" >> "$GITHUB_ENV"

      - name: Build & package (signed/notarized app, dmg + zip, arm64 + x64)
        timeout-minutes: 75
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          # On a tag, drive the artifact version from the tag (v0.1.1 -> 0.1.1) so the
          # filenames match the release. extraMetadata overrides package.json at build
          # time without committing a version bump. Off a tag, use package.json as-is.
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Building version $VERSION from tag $GITHUB_REF_NAME"
            npm run dist -- --publish never -c.extraMetadata.version="$VERSION"
          else
            npm run dist -- --publish never
          fi

      - name: Notarize and staple DMGs
        timeout-minutes: 60
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

          printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

          for dmg in release/*.dmg; do
            echo "Submitting $dmg for notarization"
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait \
              --timeout 45m
            xcrun stapler staple "$dmg"
          done

      - name: Verify macOS signing and notarization
        timeout-minutes: 10
        run: |
          set -euo pipefail
          for app in release/mac*/OKFView.app; do
            codesign --verify --deep --strict --verbose=2 "$app"
            spctl --assess --type execute --verbose=4 "$app"
            xcrun stapler validate "$app"
          done

          for dmg in release/*.dmg; do
            hdiutil verify "$dmg"
            xcrun stapler validate "$dmg"
          done

      # Use the pre-installed gh CLI (a native binary — no Node action runtime, so no
      # Node-20 deprecation) to create the Release for the pushed tag and upload the
      # artifacts to it. Idempotent: if the release already exists (re-run), it just
      # (re)uploads the assets.
      - name: Publish artifacts to the tagged GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -la release
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            release/*.dmg release/*.zip \
          || gh release upload "$GITHUB_REF_NAME" --clobber release/*.dmg release/*.zip

  # Package okfview's own OKF docs bundle with okftool and attach it to the
  # release as okfview-<version>.tar.gz. Runs on Linux (no Gatekeeper, no signing)
  # after the release exists.
  bundle:
    name: docs/okf bundle (okftool)
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build docs/okf with okftool and upload to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          cargo install okftool-cli --locked
          # `build` validates §9 conformance first, so a non-conformant docs bundle fails the release.
          okftool build docs/okf -o "okfview-${VERSION}.tar.gz"
          gh release upload "$GITHUB_REF_NAME" --clobber "okfview-${VERSION}.tar.gz"
