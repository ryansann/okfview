name: Release (macOS)

# Tag a release to build and attach a macOS .dmg + .zip to that tag's GitHub Release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']
  workflow_dispatch: # manual build from the Actions tab (no release upload unless run on a tag)

permissions:
  contents: write # needed to create the Release & upload assets

jobs:
  release:
    runs-on: macos-14 # Apple silicon runner; builds arm64 + x64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Typecheck & test
        run: |
          npm run typecheck
          npm test

      - name: Build & package (dmg + zip, arm64 + x64)
        env:
          # Unsigned build: skip auto-discovery of a signing identity.
          # To ship signed/notarized, add CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID
          # secrets and remove this line.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          set -euo pipefail
          npx electron-vite build
          # On a tag, drive the artifact version from the tag (v0.1.1 -> 0.1.1) so the
          # filenames match the release. extraMetadata overrides package.json at build
          # time without committing a version bump. Off a tag, use package.json as-is.
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Building version $VERSION from tag $GITHUB_REF_NAME"
            npx electron-builder --mac --publish never -c.extraMetadata.version="$VERSION"
          else
            npx electron-builder --mac --publish never
          fi

      # Use the pre-installed gh CLI (a native binary — no Node action runtime, so no
      # Node-20 deprecation) to create the Release for the pushed tag and upload the
      # artifacts to it. Idempotent: if the release already exists (re-run), it just
      # (re)uploads the assets.
      - name: Publish artifacts to the tagged GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -la release
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            release/*.dmg release/*.zip \
          || gh release upload "$GITHUB_REF_NAME" --clobber release/*.dmg release/*.zip
